name: Unity Android CI 

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: unityci/editor:ubuntu-2022.3.59f1-android-3.1.0

    env:
      UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
      UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
      UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
      ANDROID_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_ALIAS_PASS: ${{ secrets.ANDROID_KEY_ALIAS_PASS }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Required Secrets
        run: |
          set -e
          if [ -z "$UNITY_EMAIL" ] || [ -z "$UNITY_PASSWORD" ] || [ -z "$UNITY_SERIAL" ]; then
            echo "❌ Unity credentials missing!"
            exit 1
          fi

      - name: Cache Unity Library and Packages
        uses: actions/cache@v3
        with:
          path: |
            Library
            Packages
          key: unity-cache-${{ runner.os }}-${{ hashFiles('Packages/manifest.json') }}

      - name: Decode Android Keystore
        run: |
          set -e
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > release.keystore

      # -------------------------
      # Activate License (Log to file)
      # -------------------------
      - name: Activate Unity License
        run: |
          set -e
          unity-editor -batchmode -nographics -quit \
            -username "$UNITY_EMAIL" \
            -password "$UNITY_PASSWORD" \
            -serial "$UNITY_SERIAL" \
            -logFile unity-license.log

      # -------------------------
      # Build (Log to file)
      # -------------------------
      - name: Build Android APK and AAB
        run: |
          set -e
          unity-editor -batchmode -nographics -quit \
            -projectPath . \
            -buildTarget Android \
            -executeMethod BuildScript.BuildAndroid \
            -logFile unity-build.log \
            -noUpm

      # -------------------------
      # Always Print Logs (SUCCESS OR FAILURE)
      # -------------------------
      - name: Print Unity License Log
        if: always()
        run: |
          echo "================ LICENSE LOG ================"
          cat unity-license.log || echo "No license log found"

      - name: Print Unity Build Log
        if: always()
        run: |
          echo "================ BUILD LOG ================"
          cat unity-build.log || echo "No build log found"

      # -------------------------
      # Verify Build Output
      # -------------------------
      - name: Verify Build Output
        run: |
          set -e
          if [ ! -d "Builds" ]; then
            echo "❌ Builds directory not found!"
            exit 1
          fi

          if ! ls Builds/*.apk 1> /dev/null 2>&1; then
            echo "❌ APK not generated!"
            exit 1
          fi

          if ! ls Builds/*.aab 1> /dev/null 2>&1; then
            echo "❌ AAB not generated!"
            exit 1
          fi

          echo "✅ APK and AAB successfully generated."

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Android-Build
          path: Builds/

      - name: Send Slack Success Notification
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"text\": \"✅ *Unity Android Build SUCCESS* 🚀\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}\nArtifacts: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
          }" ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Send Slack Failure Notification
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"text\": \"❌ *Unity Android Build FAILED* 💥\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}\nCheck logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
          }" ${{ secrets.SLACK_WEBHOOK_URL }}
