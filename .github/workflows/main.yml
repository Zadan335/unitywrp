name: Unity Android CI (Personal License Hardcoded)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: unityci/editor:ubuntu-2022.3.59f1-android-3.1.0

    env:
      UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
      UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
      UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
      ANDROID_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_ALIAS_PASS: ${{ secrets.ANDROID_KEY_ALIAS_PASS }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Unity Library and Packages
        uses: actions/cache@v3
        with:
          path: |
            Library
            Packages
          key: unity-cache-${{ runner.os }}-${{ hashFiles('Packages/manifest.json') }}

      - name: Decode Android Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > release.keystore

      - name: Activate Unity License
        run: |
          unity-editor -batchmode -nographics -quit \
            -username "$UNITY_EMAIL" \
            -password "$UNITY_PASSWORD" \
            -serial "$UNITY_SERIAL" \
            -logFile /dev/stdout || true

      - name: Build Android APK and AAB
        run: |
          unity-editor -batchmode -nographics -quit \
            -projectPath . \
            -buildTarget Android \
            -executeMethod BuildScript.BuildAndroid \
            -logFile /dev/stdout \
            -noUpm

      - name: List Build Folder
        run: ls -la Builds/

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Android-Build
          path: Builds/

      - name: Send Slack Notification
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"text\": \"✅ Unity Android Build Success!\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}\nArtifacts: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
          }" ${{ secrets.SLACK_WEBHOOK_URL }}
