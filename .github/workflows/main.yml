name: Unity Android CI (License Skip)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: unityci/editor:ubuntu-2022.3.59f1-android-3.1.0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Decode Android Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > release.keystore

      - name: Set Android Keystore Env Vars
        run: |
          echo "ANDROID_KEYSTORE_PASS=${{ secrets.ANDROID_KEYSTORE_PASS }}" >> $GITHUB_ENV
          echo "ANDROID_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> $GITHUB_ENV
          echo "ANDROID_KEY_ALIAS_PASS=${{ secrets.ANDROID_KEY_ALIAS_PASS }}" >> $GITHUB_ENV

      - name: Build Android APK and AAB (ignore license errors)
        run: |
          set +e  # <-- ignore errors so license doesn't fail the workflow
          unity-editor \
            -batchmode \
            -nographics \
            -quit \
            -projectPath . \
            -buildTarget Android \
            -executeMethod BuildScript.BuildAndroid \
            -logFile /dev/stdout \
            -noUpm
          set -e

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Android-Build
          path: Builds/

      - name: Send Slack Notification
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"text\": \"✅ Unity Android Build Success (License Skipped)!\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}\nArtifacts: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
          }" ${{ secrets.SLACK_WEBHOOK_URL }}
