name: Unity Android CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    # Dockerized Unity editor
    container:
      image: unityci/editor:ubuntu-2022.3.59f1-android-3.1.0

    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Decode Android keystore
      - name: Decode Android Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > release.keystore

      # Step 3: Set Android keystore environment variables
      - name: Set Android Keystore Env Vars
        run: |
          echo "ANDROID_KEYSTORE_PASS=${{ secrets.ANDROID_KEYSTORE_PASS }}" >> $GITHUB_ENV
          echo "ANDROID_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> $GITHUB_ENV
          echo "ANDROID_KEY_ALIAS_PASS=${{ secrets.ANDROID_KEY_ALIAS_PASS }}" >> $GITHUB_ENV

      # Step 4: Build Android APK and AAB
      - name: Build Android APK and AAB
        run: |
          unity-editor \
            -batchmode \
            -nographics \
            -quit \
            -projectPath . \
            -buildTarget Android \
            -executeMethod BuildScript.BuildAndroid \
            -logFile /dev/stdout

      # Step 5: Upload artifacts
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Android-Build
          path: Builds/

      # Step 6: Send Slack notification
      - name: Send Slack Notification
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"text\": \"✅ Unity Android Build Success!\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}\nArtifacts: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
          }" ${{ secrets.SLACK_WEBHOOK_URL }}
