name: Unity Android CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    container:
      image: unityci/editor:ubuntu-2022.3.59f1-android-3.1.0

    env:
      UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
      UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
      UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
      ANDROID_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_ALIAS_PASS: ${{ secrets.ANDROID_KEY_ALIAS_PASS }}

    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        run: |
          if [ -z "$UNITY_EMAIL" ] || [ -z "$UNITY_PASSWORD" ] || [ -z "$UNITY_SERIAL" ]; then
            echo "Missing Unity credentials"
            exit 1
          fi

          if [ -z "${{ secrets.ANDROID_KEYSTORE }}" ]; then
            echo "Missing Android keystore secret"
            exit 1
          fi

      - name: Cache Unity folders
        uses: actions/cache@v3
        with:
          path: |
            Library
            Packages
          key: unity-${{ runner.os }}-${{ hashFiles('Packages/manifest.json') }}
          restore-keys: |
            unity-${{ runner.os }}-

    
      - name: Prepare Android keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > release.keystore
          if [ ! -f release.keystore ]; then
            echo "Failed to decode keystore"
            exit 1
          fi

      - name: Activate Unity license
        run: |
          unity-editor -batchmode -nographics -quit \
            -username "$UNITY_EMAIL" \
            -password "$UNITY_PASSWORD" \
            -serial "$UNITY_SERIAL" \
            -logFile unity-license.log

      - name: Build Android (APK + AAB)
        run: |
          unity-editor -batchmode -nographics -quit \
            -projectPath . \
            -buildTarget Android \
            -executeMethod BuildScript.BuildAndroid \
            -logFile unity-build.log \
            -noUpm

      - name: Output license log
        if: always()
        run: cat unity-license.log || echo "No license log found"

      - name: Verify build outputs
        run: |
          if [ ! -d "Builds" ]; then
            echo "Builds folder not found"
            exit 1
          fi

          if ! ls Builds/*.apk >/dev/null 2>&1; then
            echo "APK not generated"
            exit 1
          fi

          if ! ls Builds/*.aab >/dev/null 2>&1; then
            echo "AAB not generated"
            exit 1
          fi

          echo "Android build completed successfully"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: Builds/

      - name: Notify Slack (success)
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"text\": \"Unity Android build succeeded\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
          }" ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack (failure)
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"text\": \"Unity Android build failed\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}\nLogs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
          }" ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Return Unity license
        if: always()
        run: |
          unity-editor -batchmode -nographics -quit \
            -returnlicense \
            -logFile /dev/stdout || true
